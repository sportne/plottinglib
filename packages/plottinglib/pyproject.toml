[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "plottinglib"
version = "0.1.0"
description = "Small Matplotlib conventions package for exploratory plotting."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [
  { name = "Plottinglib Maintainers" }
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Science/Research",
  "Intended Audience :: Manufacturing",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Scientific/Engineering :: Visualization",
]
dependencies = [
  "matplotlib>=3.8",
  "mplcursors>=0.6",
  "numpy>=1.26",
]

[dependency-groups]
dev = [
  "pytest>=8.3",
  "pytest-cov>=6.0",
  "ruff>=0.9.0",
  "ty>=0.0.1a20",
]

[tool.hatch.build.targets.wheel]
packages = ["src/plottinglib"]

[tool.uv]
package = true

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "tests", "scripts"]

[tool.ruff.format]
docstring-code-format = true
line-ending = "lf"

[tool.ruff.lint]
select = [
  "A",
  "ARG",
  "B",
  "C4",
  "E",
  "F",
  "I",
  "N",
  "NPY",
  "PERF",
  "PIE",
  "PL",
  "PTH",
  "RET",
  "RUF",
  "SIM",
  "UP",
  "W",
]
ignore = [
  "PLR0913", # plotting helpers naturally have several keyword options
  "PLR2004", # numeric thresholds in plotting code are clearer inline
  "PLC0415", # delay pyplot/backend imports until functions are called
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["ARG001", "PLR2004"]
"examples/**/*.py" = ["T201"]
"scripts/**/*.py" = ["T201"]

[tool.ty.environment]
python-version = "3.11"
root = ["./src", "./tests", "./scripts"]

[tool.ty.analysis]
# Practical scientific-Python typing: keep first-party APIs typed while avoiding
# churn from GUI/plotting objects whose public stubs can vary by backend/version.
replace-imports-with-any = ["matplotlib.**", "mplcursors"]

[tool.ty.rules]
possibly-unresolved-reference = "warn"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = [
  "--import-mode=importlib",
  "--cov=plottinglib",
  "--cov-branch",
  "--cov-report=term-missing",
  "--cov-report=json",
  "--cov-fail-under=80",
]
filterwarnings = [
  "error",
]

[tool.coverage.run]
branch = true
source = ["plottinglib"]

[tool.coverage.report]
fail_under = 80
show_missing = true
skip_covered = false
exclude_also = [
  "if TYPE_CHECKING:",
  "raise NotImplementedError",
]

[tool.coverage.json]
output = "coverage.json"
